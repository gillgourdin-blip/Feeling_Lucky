<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Feeling Lucky?</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Feeling Lucky" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='.9em' font-size='80' x='10'>🍀</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: Georgia, serif;
      color: #f5f0e8;
      overflow-x: hidden;
    }

    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.9; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes reveal { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: #C9A84C;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    .screen { display: none; animation: fadeIn 0.5s ease; }
    .screen.active { display: block; }

    .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 28px 18px 48px; }

    h1 { font-size: 40px; color: #C9A84C; font-style: italic; letter-spacing: 2px; text-align: center; margin-bottom: 4px; }
    h2 { font-size: 22px; color: #C9A84C; margin-bottom: 20px; }
    h3 { font-size: 17px; color: #C9A84C; margin-bottom: 10px; }

    .subtitle { color: rgba(245,240,232,0.55); font-style: italic; text-align: center; margin-bottom: 36px; font-size: 14px; }

    .btn {
      cursor: pointer; border: none; border-radius: 10px;
      font-family: Georgia, serif; transition: all 0.2s;
      width: 100%; padding: 15px; font-size: 16px; margin-bottom: 12px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-gold { background: linear-gradient(135deg, #C9A84C, #a07830); color: #1a1a2e; font-weight: bold; }
    .btn-green { background: linear-gradient(135deg, #2D5016, #4A7C1F); color: #f5f0e8; }
    .btn-ghost { background: rgba(255,255,255,0.07); color: rgba(245,240,232,0.6); border: 1px solid rgba(201,168,76,0.2); }
    .btn-back { background: rgba(255,255,255,0.08); color: #f5f0e8; width: auto; padding: 8px 16px; font-size: 14px; margin-bottom: 0; border-radius: 8px; }
    .btn-small { width: auto; padding: 4px 12px; font-size: 12px; margin-bottom: 0; border-radius: 20px; }
    .btn-reset { background: rgba(139,46,46,0.3); color: #e88; border: 1px solid rgba(139,46,46,0.4); }
    .btn-disabled { opacity: 0.4; pointer-events: none; }

    .header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }

    .theme-tabs { display: flex; gap: 8px; margin-bottom: 22px; }
    .theme-tab {
      flex: 1; padding: 10px 4px; font-size: 12px; font-family: Georgia, serif;
      border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07); color: #f5f0e8; transition: all 0.2s;
      text-align: center;
    }
    .theme-tab.active-connectie { background: #C9A84C; color: #1a1a2e; font-weight: bold; border-color: #C9A84C; }
    .theme-tab.active-ontspanning { background: #4A7C1F; color: #f5f0e8; font-weight: bold; border-color: #4A7C1F; }
    .theme-tab.active-intiem { background: #8B2E2E; color: #f5f0e8; font-weight: bold; border-color: #8B2E2E; }

    .task-group { display: flex; flex-direction: column; gap: 14px; }
    .task-item label { font-size: 13px; color: rgba(245,240,232,0.45); display: block; margin-bottom: 6px; }
    .task-item textarea {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px; color: #f5f0e8; font-family: Georgia, serif;
      padding: 10px 14px; width: 100%; resize: vertical; outline: none;
      font-size: 14px; line-height: 1.5; transition: border-color 0.2s;
    }
    .task-item textarea:focus { border-color: #C9A84C; }
    .task-item textarea::placeholder { color: rgba(245,240,232,0.3); }
    .drawn-tag { margin-left: 8px; color: #C9A84C; font-size: 11px; }

    .divider { border: none; border-top: 1px solid rgba(201,168,76,0.2); margin: 20px 0; }
    .divider-gold { border-top: 2px solid #C9A84C; }

    .stats-box {
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px; padding: 14px; text-align: center; margin-top: 24px;
    }
    .stats-box p { color: #C9A84C; font-size: 14px; }

    /* Draw result */
    .draw-emoji { font-size: 60px; text-align: center; margin-bottom: 16px; animation: pulse 2s ease infinite; }
    .draw-label { color: rgba(245,240,232,0.5); letter-spacing: 3px; font-size: 12px; text-transform: uppercase; text-align: center; margin-bottom: 8px; }
    .draw-theme { color: #C9A84C; font-size: 26px; font-style: italic; text-align: center; margin-bottom: 24px; }
    .draw-card {
      background: rgba(201,168,76,0.1); border: 2px solid #C9A84C;
      border-radius: 16px; padding: 28px 22px; margin-bottom: 28px;
      animation: reveal 0.5s ease;
    }
    .draw-card p { font-size: 20px; font-style: italic; line-height: 1.6; text-align: center; }
    .draw-btns { display: flex; gap: 12px; }
    .draw-btns .btn { margin-bottom: 0; }

    /* Spinning */
    .spinning { animation: spin 0.8s linear infinite; display: inline-block; }

    /* Backend */
    .backend-task {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px; margin-bottom: 8px;
    }
    .backend-task .task-text { flex: 1; }
    .backend-task .task-text .task-num { font-size: 12px; color: rgba(245,240,232,0.4); margin-bottom: 2px; }
    .backend-task .task-text .task-val { font-size: 14px; }
    .backend-task .task-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .tag {
      font-size: 11px; padding: 3px 9px; border-radius: 20px;
    }
    .tag-drawn { background: rgba(201,168,76,0.3); color: #C9A84C; }
    .tag-available { background: rgba(74,124,31,0.3); color: #7bc44e; }
    .tag-empty { background: rgba(255,255,255,0.08); color: rgba(245,240,232,0.3); }
    .bg-drawn { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.35); }
    .bg-available { background: rgba(74,124,31,0.12); border: 1px solid rgba(74,124,31,0.25); }
    .bg-empty { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }

    /* PIN */
    .pin-wrap { text-align: center; padding: 32px 0; }
    .pin-wrap p { color: rgba(245,240,232,0.6); margin-bottom: 16px; }
    .pin-input {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px; color: #f5f0e8; font-family: Georgia, serif;
      padding: 10px 14px; width: 140px; text-align: center; font-size: 20px;
      outline: none; letter-spacing: 8px; margin-bottom: 14px;
    }
    .pin-input:focus { border-color: #C9A84C; }
    .pin-error { color: #e88; font-size: 13px; margin-top: 10px; }
    .pin-hint { color: rgba(245,240,232,0.25); font-size: 12px; margin-top: 14px; }

    .bottom-summary {
      padding: 14px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.2);
      text-align: center; margin-top: 8px;
    }
    .bottom-summary p { color: #C9A84C; font-size: 13px; }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="wrap">
    <div style="text-align:center; font-size:64px; margin-bottom:8px;">🍀</div>
    <h1>Feeling Lucky?</h1>
    <p class="subtitle">Een spel voor twee</p>
    <hr class="divider divider-gold" style="margin-bottom:32px;">
    <button class="btn btn-gold" onclick="showScreen('setup')">✏️ Opdrachten ingeven</button>
    <button class="btn btn-green" id="btn-draw" onclick="drawRandom()">🎲 Trek een opdracht</button>
    <button class="btn btn-ghost" onclick="showScreen('backend')">🔒 Beheer (admin)</button>
    <div class="stats-box" id="home-stats" style="display:none;">
      <p id="home-stats-text"></p>
    </div>
  </div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="wrap">
    <div class="header-row">
      <button class="btn btn-back" onclick="showScreen('home')">← Terug</button>
      <h2 style="margin:0;">Opdrachten ingeven</h2>
    </div>
    <div class="theme-tabs">
      <div class="theme-tab active-connectie" id="tab-connectie" onclick="switchTab('connectie')">🤍 Connectie</div>
      <div class="theme-tab" id="tab-ontspanning" onclick="switchTab('ontspanning')">🌿 Ontspanning</div>
      <div class="theme-tab" id="tab-intiem" onclick="switchTab('intiem')">🔥 Intiem</div>
    </div>
    <div class="task-group" id="setup-tasks"></div>
    <button class="btn btn-gold" style="margin-top:24px;" onclick="showScreen('home')">✅ Opslaan & terug</button>
  </div>
</div>

<!-- DRAW RESULT -->
<div id="screen-draw" class="screen">
  <div class="wrap">
    <div class="draw-emoji">🎉</div>
    <p class="draw-label">Thema</p>
    <p class="draw-theme" id="draw-theme"></p>
    <div class="draw-card">
      <p id="draw-text"></p>
    </div>
    <div class="draw-btns">
      <button class="btn btn-ghost" style="flex:1;" onclick="showScreen('home')">← Terug</button>
      <button class="btn btn-green" style="flex:2;" id="btn-draw-again" onclick="drawRandom()">🎲 Trek nog een opdracht</button>
    </div>
  </div>
</div>

<!-- BACKEND -->
<div id="screen-backend" class="screen">
  <div class="wrap">
    <div class="header-row">
      <button class="btn btn-back" onclick="showScreen('home'); adminUnlocked=false; document.getElementById('pin-section').style.display='block'; document.getElementById('admin-content').style.display='none'; document.getElementById('pin-input').value=''; document.getElementById('pin-error').textContent='';">← Terug</button>
      <h2 style="margin:0;">🔒 Admin overzicht</h2>
    </div>
    <div id="pin-section">
      <div class="pin-wrap">
        <p>Voer de PIN in</p>
        <input class="pin-input" type="password" id="pin-input" maxlength="4" placeholder="····" oninput="checkPin()" />
        <div class="pin-error" id="pin-error"></div>
        <p class="pin-hint">Standaard PIN: 1234</p>
      </div>
    </div>
    <div id="admin-content" style="display:none;">
      <div id="backend-tasks"></div>
      <div class="bottom-summary"><p id="backend-summary"></p></div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const THEMES = [
  { id: "connectie",   label: "🤍 Connectie",   color: "#C9A84C" },
  { id: "ontspanning", label: "🌿 Ontspanning",  color: "#4A7C1F" },
  { id: "intiem",      label: "🔥 Intiem",       color: "#8B2E2E" },
];

let tasks = {
  connectie: [
    { id:"c1", text:"Witte tantra oefeningen (met kaarslicht)", drawn:false },
    { id:"c2", text:"Samen een gedicht maken (met kaarslicht)", drawn:false },
    { id:"c3", text:"Stel elkaar deze 36 vragen (met kaarslicht)", drawn:false },
  ],
  ontspanning: [
    { id:"o1", text:"Volledige massage: Rug, armen of Rug en benen. (Muziek)", drawn:false },
    { id:"o2", text:"3 concrete gezamenlijke toekomstdromen opschrijven. Kan vanalles zijn en bespreek. (Muziek)", drawn:false },
    { id:"o3", text:"Samen een ontspannend bad nemen met muziek.", drawn:false },
  ],
  intiem: [
    { id:"i1", text:"Naakte full body massage krijgen: met volledig lichaam mijn lichaam masseren (kaarslicht en muziek)", drawn:false },
    { id:"i2", text:"Samen in bad gaan en elkaar wassen! Overal! (Kaarslicht en muziek)", drawn:false },
    { id:"i3", text:"Minimum 10 min lang gepassioneerd kussen. Zonder dat het iets anders hoeft te worden, of toch? ☺️ (Kaarslicht en muziek)", drawn:false },
  ],
};

let activeTab = "connectie";
let adminUnlocked = false;
const PIN = "1234";

// ── STARS ─────────────────────────────────────────────────────
const starsEl = document.getElementById("stars");
for (let i = 0; i < 22; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const size = Math.random() * 3 + 1;
  s.style.cssText = `width:${size}px;height:${size}px;opacity:${Math.random()*0.5+0.2};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;
  starsEl.appendChild(s);
}

// ── SCREENS ───────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
  if (id === "home") updateHomeStats();
  if (id === "setup") renderSetup();
  if (id === "backend" && adminUnlocked) renderBackend();
}

// ── STATS ─────────────────────────────────────────────────────
function getStats() {
  const all = Object.values(tasks).flat();
  const filled = all.filter(t => t.text.trim()).length;
  const drawn  = all.filter(t => t.drawn).length;
  return { filled, drawn, available: filled - drawn };
}

function updateHomeStats() {
  const { drawn, available } = getStats();
  const box = document.getElementById("home-stats");
  if (drawn > 0) {
    box.style.display = "block";
    document.getElementById("home-stats-text").textContent =
      `${drawn} opdracht${drawn!==1?"en":""} al getrokken · ${available} resterend`;
  } else {
    box.style.display = "none";
  }
  const btnDraw = document.getElementById("btn-draw");
  if (available === 0) {
    btnDraw.classList.add("btn-disabled");
    btnDraw.textContent = "🎲 Geen opdrachten meer";
  } else {
    btnDraw.classList.remove("btn-disabled");
    btnDraw.textContent = `🎲 Trek een opdracht (${available} beschikbaar)`;
  }
}

// ── SETUP ─────────────────────────────────────────────────────
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll(".theme-tab").forEach(t => {
    t.className = "theme-tab";
  });
  const tab = document.getElementById("tab-" + id);
  tab.className = "theme-tab active-" + id;
  renderSetup();
}

function renderSetup() {
  const container = document.getElementById("setup-tasks");
  container.innerHTML = "";
  tasks[activeTab].forEach((task, i) => {
    const div = document.createElement("div");
    div.className = "task-item";
    div.innerHTML = `
      <label>Opdracht ${i+1}${task.drawn ? '<span class="drawn-tag">✓ al getrokken</span>' : ''}</label>
      <textarea rows="2" placeholder="Opdracht ${i+1}..." ${task.drawn ? 'style="opacity:0.5"' : ''}>${task.text}</textarea>
    `;
    div.querySelector("textarea").addEventListener("input", e => {
      tasks[activeTab][i].text = e.target.value;
      updateHomeStats();
    });
    container.appendChild(div);
  });
}

// ── DRAW ──────────────────────────────────────────────────────
function drawRandom() {
  const available = [];
  THEMES.forEach(theme => {
    tasks[theme.id].forEach(task => {
      if (task.text.trim() && !task.drawn) {
        available.push({ themeId: theme.id, themeLabel: theme.label, taskId: task.id, text: task.text });
      }
    });
  });
  if (!available.length) return;

  // Spinning effect on home button
  const btnDraw = document.getElementById("btn-draw");
  btnDraw.innerHTML = '<span class="spinning">🎲</span> Trekken...';
  btnDraw.classList.add("btn-disabled");

  setTimeout(() => {
    const pick = available[Math.floor(Math.random() * available.length)];
    tasks[pick.themeId].find(t => t.id === pick.taskId).drawn = true;

    document.getElementById("draw-theme").textContent = pick.themeLabel;
    document.getElementById("draw-text").textContent = '"' + pick.text + '"';

    const { available: avail } = getStats();
    const btnAgain = document.getElementById("btn-draw-again");
    if (avail === 0) {
      btnAgain.classList.add("btn-disabled");
      btnAgain.textContent = "Geen opdrachten meer";
    } else {
      btnAgain.classList.remove("btn-disabled");
      btnAgain.textContent = "🎲 Trek nog een opdracht";
    }

    showScreen("draw");
    updateHomeStats();
  }, 1400);
}

// ── BACKEND ───────────────────────────────────────────────────
function checkPin() {
  const val = document.getElementById("pin-input").value;
  if (val === PIN) {
    adminUnlocked = true;
    document.getElementById("pin-section").style.display = "none";
    document.getElementById("admin-content").style.display = "block";
    renderBackend();
  } else if (val.length === 4) {
    document.getElementById("pin-error").textContent = "Foute PIN";
  } else {
    document.getElementById("pin-error").textContent = "";
  }
}

function renderBackend() {
  const container = document.getElementById("backend-tasks");
  container.innerHTML = "";
  THEMES.forEach(theme => {
    const section = document.createElement("div");
    section.style.marginBottom = "22px";
    section.innerHTML = `<h3 style="color:${theme.color}">${theme.label}</h3>`;
    tasks[theme.id].forEach((task, i) => {
      const cls = task.drawn ? "bg-drawn" : task.text ? "bg-available" : "bg-empty";
      const tagCls = task.drawn ? "tag-drawn" : task.text ? "tag-available" : "tag-empty";
      const tagTxt = task.drawn ? "getrokken" : task.text ? "beschikbaar" : "leeg";
      const icon = task.drawn ? "✅" : task.text ? "⏳" : "⬜";
      const div = document.createElement("div");
      div.className = `backend-task ${cls}`;
      div.innerHTML = `
        <span style="font-size:18px">${icon}</span>
        <div class="task-text">
          <div class="task-num">Opdracht ${i+1}</div>
          <div class="task-val" style="color:${task.text ? '#f5f0e8' : 'rgba(245,240,232,0.25)'}; font-style:${task.text ? 'normal' : 'italic'}">
            ${task.text || "Nog niet ingevuld"}
          </div>
        </div>
        <div class="task-actions">
          <span class="tag ${tagCls}">${tagTxt}</span>
          ${task.drawn ? `<button class="btn btn-small btn-reset" onclick="resetTask('${theme.id}','${task.id}')">↺ Reset</button>` : ''}
        </div>
      `;
      section.appendChild(div);
    });
    container.appendChild(section);
  });

  const { drawn, available, filled } = getStats();
  document.getElementById("backend-summary").textContent =
    `${drawn} getrokken · ${available} beschikbaar · ${9 - filled} leeg`;
}

function resetTask(themeId, taskId) {
  tasks[themeId].find(t => t.id === taskId).drawn = false;
  renderBackend();
  updateHomeStats();
}

// ── INIT ──────────────────────────────────────────────────────
updateHomeStats();
</script>
</body>
</html>
